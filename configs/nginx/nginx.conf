events {}

http {
  server {
    listen 80;
    server_name _;

    location = /healthz {
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    location / {
      add_header Content-Type application/json;
      return 200 '{"service":"gateway","status":"configured","message":"nginx gateway skeleton is running"}';
    }
  }
}
