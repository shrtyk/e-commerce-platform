events {}

http {
  limit_req_zone $binary_remote_addr zone=public_api_rate_limit:10m rate=100r/s;

  map $http_x_request_id $gateway_request_id {
    default $http_x_request_id;
    "" $request_id;
  }

  map $http_x_correlation_id $gateway_correlation_id {
    default $http_x_correlation_id;
    "" $gateway_request_id;
  }

  upstream identity_svc {
    server identity-svc:18081;
  }

  upstream product_svc {
    server product-svc:18082;
  }

  upstream cart_svc {
    server cart-svc:18083;
  }

  upstream order_svc {
    server order-svc:18084;
  }

  server {
    listen 80;
    server_name _;

    limit_req_status 429;
    error_page 429 = @rate_limited;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $gateway_request_id;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Correlation-Id $gateway_correlation_id;
    proxy_set_header Idempotency-Key $http_idempotency_key;

    location = /healthz {
      default_type text/plain;
      return 200 "ok";
    }

    location = /v1/auth/register {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://identity_svc;
    }

    location = /v1/auth/register-admin {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://identity_svc;
    }

    location = /v1/auth/login {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://identity_svc;
    }

    location = /v1/auth/refresh {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://identity_svc;
    }

    location = /v1/profile/me {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://identity_svc;
    }

    location = /v1/products {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://product_svc;
    }

    location ~ ^/v1/products/[^/]+$ {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://product_svc;
    }

    location = /v1/cart {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://cart_svc;
    }

    location = /v1/cart/items {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://cart_svc;
    }

    location ~ ^/v1/cart/items/[^/]+$ {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://cart_svc;
    }

    location = /v1/orders {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://order_svc;
    }

    location ~ ^/v1/orders/[^/]+$ {
      limit_req zone=public_api_rate_limit burst=100 nodelay;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://order_svc;
    }

    location @rate_limited {
      default_type application/json;
      include /etc/nginx/conf.d/api_headers.inc;
      if ($request_method = OPTIONS) {
        return 204;
      }
      add_header Retry-After 1 always;
      return 429 '{"error":{"code":"RATE_LIMITED","message":"too many requests"}}';
    }

    location / {
      default_type application/json;
      return 200 '{"service":"gateway","status":"configured","message":"nginx gateway skeleton is running"}';
    }
  }
}
