services:
  payment-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${PAYMENT_POSTGRES_DB:-payment}
      POSTGRES_USER: ${PAYMENT_POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD:-payment}
    ports:
      - "${PAYMENT_POSTGRES_PORT:-5437}:5432"
    volumes:
      - payment-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  payment-postgres-data:
