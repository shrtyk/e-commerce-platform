services:
  cart-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${CART_POSTGRES_DB:-cart}
      POSTGRES_USER: ${CART_POSTGRES_USER:-cart}
      POSTGRES_PASSWORD: ${CART_POSTGRES_PASSWORD:-cart}
    ports:
      - "${CART_POSTGRES_PORT:-5435}:5432"
    volumes:
      - cart-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  cart-redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${CART_REDIS_PORT:-6380}:6379"
    volumes:
      - cart-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  cart-postgres-data:
  cart-redis-data:
