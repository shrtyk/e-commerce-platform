name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  GO_VERSION: "1.26.0"
  GOLANGCI_LINT_VERSION: v2.5.0

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - internal/common
          - internal/identity-svc
          - internal/product-svc
          - internal/cart-svc
          - internal/order-svc
          - internal/payment-svc
          - internal/notification-svc
          - tests/e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-mode: goinstall
          working-directory: ${{ matrix.module }}

  unit-tests:
    name: unit-tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: internal/common
            coverage_name: common
          - module: internal/identity-svc
            coverage_name: identity-svc
          - module: internal/product-svc
            coverage_name: product-svc
          - module: internal/cart-svc
            coverage_name: cart-svc
          - module: internal/order-svc
            coverage_name: order-svc
          - module: internal/payment-svc
            coverage_name: payment-svc
          - module: internal/notification-svc
            coverage_name: notification-svc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with coverage
        working-directory: ${{ matrix.module }}
        run: go test -v -covermode=atomic -coverprofile=coverage.out ./...

      - name: Collect coverage file
        run: |
          mkdir -p coverage
          cp "${{ matrix.module }}/coverage.out" "coverage/${{ matrix.coverage_name }}.out"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.coverage_name }}
          path: coverage/${{ matrix.coverage_name }}.out
          if-no-files-found: error

  coverage:
    name: coverage-upload
    needs: unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage
          pattern: coverage-*
          merge-multiple: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/*.out
          flags: unittests
          slug: shrtyk/e-commerce-platform
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
