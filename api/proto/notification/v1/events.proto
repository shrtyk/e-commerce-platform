syntax = "proto3";

package ecommerce.notification.v1;

import "common/v1/event_metadata.proto";
import "notification/v1/types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/shrtyk/e-commerce-platform/internal/common/gen/proto/notification/v1;notificationv1";

message DeliveryRequested {
  ecommerce.common.v1.EventMetadata metadata = 1;
  string delivery_request_id = 2;
  string source_event_name = 3;
  string channel = 4;
  string recipient = 5;
  string template_key = 6;
  DeliveryStatus status = 7;
}

message NotificationSent {
  ecommerce.common.v1.EventMetadata metadata = 1;
  string delivery_request_id = 2;
  string source_event_name = 3;
  string channel = 4;
  string recipient = 5;
  DeliveryStatus status = 6;
  google.protobuf.Timestamp sent_at = 7;
}

message NotificationFailed {
  ecommerce.common.v1.EventMetadata metadata = 1;
  string delivery_request_id = 2;
  string source_event_name = 3;
  string channel = 4;
  string recipient = 5;
  DeliveryStatus status = 6;
  string failure_code = 7;
  string failure_message = 8;
  google.protobuf.Timestamp failed_at = 9;
}
