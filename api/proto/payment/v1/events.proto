syntax = "proto3";

package ecommerce.payment.v1;

import "common/v1/event_metadata.proto";
import "common/v1/money.proto";
import "payment/v1/types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/shrtyk/e-commerce-platform/internal/common/gen/proto/payment/v1;paymentv1";

message PaymentInitiated {
  ecommerce.common.v1.EventMetadata metadata = 1;
  string payment_attempt_id = 2;
  string order_id = 3;
  PaymentStatus status = 4;
  ecommerce.common.v1.Money amount = 5;
  string provider_name = 6;
}

message PaymentSucceeded {
  ecommerce.common.v1.EventMetadata metadata = 1;
  string payment_attempt_id = 2;
  string order_id = 3;
  PaymentStatus status = 4;
  ecommerce.common.v1.Money amount = 5;
  string provider_name = 6;
  string provider_reference = 7;
  google.protobuf.Timestamp processed_at = 8;
}

message PaymentFailed {
  ecommerce.common.v1.EventMetadata metadata = 1;
  string payment_attempt_id = 2;
  string order_id = 3;
  PaymentStatus status = 4;
  ecommerce.common.v1.Money amount = 5;
  string provider_name = 6;
  string failure_code = 7;
  string failure_message = 8;
  google.protobuf.Timestamp processed_at = 9;
}
