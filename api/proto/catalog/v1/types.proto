syntax = "proto3";

package ecommerce.catalog.v1;

import "common/v1/money.proto";

option go_package = "github.com/shrtyk/e-commerce-platform/internal/common/gen/proto/catalog/v1;catalogv1";

enum ProductStatus {
  PRODUCT_STATUS_UNSPECIFIED = 0;
  PRODUCT_STATUS_DRAFT = 1;
  PRODUCT_STATUS_PUBLISHED = 2;
  PRODUCT_STATUS_ARCHIVED = 3;
}

message Category {
  string category_id = 1;
  string name = 2;
  string slug = 3;
}

message Product {
  string product_id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  ProductStatus status = 5;
  ecommerce.common.v1.Money price = 6;
  string category_id = 7;
}

message StockRecord {
  string product_id = 1;
  int64 on_hand = 2;
  int64 reserved = 3;
  int64 available = 4;
}
