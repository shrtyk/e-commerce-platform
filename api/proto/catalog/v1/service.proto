syntax = "proto3";

package ecommerce.catalog.v1;

import "common/v1/pagination.proto";
import "catalog/v1/types.proto";

option go_package = "github.com/shrtyk/e-commerce-platform/internal/common/gen/proto/catalog/v1;catalogv1";

service CatalogService {
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc ListPublishedProducts(ListPublishedProductsRequest) returns (ListPublishedProductsResponse);
  rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);
  rpc ReleaseStock(ReleaseStockRequest) returns (ReleaseStockResponse);
}

message GetProductRequest {
  string product_id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message ListPublishedProductsRequest {
  ecommerce.common.v1.PageRequest page = 1;
  string category_id = 2;
}

message ListPublishedProductsResponse {
  repeated Product items = 1;
  ecommerce.common.v1.PageResponse page = 2;
}

message ReserveStockRequest {
  string order_id = 1;
  repeated ReservationItem items = 2;
}

message ReservationItem {
  string product_id = 1;
  int64 quantity = 2;
}

message ReserveStockResponse {
  bool accepted = 1;
}

message ReleaseStockRequest {
  string order_id = 1;
}

message ReleaseStockResponse {
  bool accepted = 1;
}
