syntax = "proto3";

package ecommerce.order.v1;

import "common/v1/money.proto";

option go_package = "github.com/shrtyk/e-commerce-platform/internal/common/gen/proto/order/v1;orderv1";

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_AWAITING_STOCK = 2;
  ORDER_STATUS_AWAITING_PAYMENT = 3;
  ORDER_STATUS_CONFIRMED = 4;
  ORDER_STATUS_CANCELLED = 5;
}

enum CheckoutErrorCode {
  CHECKOUT_ERROR_CODE_UNSPECIFIED = 0;
  CHECKOUT_ERROR_CODE_INVALID_ARGUMENT = 1;
  CHECKOUT_ERROR_CODE_CART_NOT_FOUND = 2;
  CHECKOUT_ERROR_CODE_CART_EMPTY = 3;
  CHECKOUT_ERROR_CODE_SKU_NOT_FOUND = 4;
  CHECKOUT_ERROR_CODE_STOCK_UNAVAILABLE = 5;
  CHECKOUT_ERROR_CODE_PAYMENT_DECLINED = 6;
  CHECKOUT_ERROR_CODE_IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_PAYLOAD = 7;
  CHECKOUT_ERROR_CODE_CONFLICT = 8;
  CHECKOUT_ERROR_CODE_INTERNAL = 9;
}

message OrderItem {
  string order_item_id = 1;
  string product_id = 2;
  string sku = 3;
  string name = 4;
  int64 quantity = 5;
  ecommerce.common.v1.Money unit_price = 6;
  ecommerce.common.v1.Money line_total = 7;
}

message Order {
  string order_id = 1;
  string user_id = 2;
  OrderStatus status = 3;
  string currency = 4;
  ecommerce.common.v1.Money total_amount = 5;
  repeated OrderItem items = 6;
}
