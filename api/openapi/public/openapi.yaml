openapi: 3.0.0
info:
  title: E-Commerce Platform Public API
  version: 0.1.0
  description: Initial version of REST API surface.
servers:
  - url: http://127.0.0.1:8080
    description: Local gateway
tags:
  - name: Auth
    description: Authentication and token operations.
  - name: Profile
    description: Current user profile operations.
  - name: Catalog
    description: Public product catalog operations.
  - name: Cart
    description: Shopping cart operations.
  - name: Orders
    description: Checkout and order retrieval operations.
security:
  - bearerAuth: []
paths:
  /v1/auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/auth/register-admin:
    post:
      tags: [Auth]
      operationId: registerAdmin
      summary: Register a new admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Admin user registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Authenticate user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/profile/me:
    get:
      tags: [Profile]
      operationId: getMyProfile
      summary: Get current user profile
      responses:
        '200':
          description: Profile details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Profile]
      operationId: updateMyProfile
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/products:
    get:
      tags: [Catalog]
      operationId: listPublishedProducts
      summary: List published products
      security: []
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
    post:
      tags: [Catalog]
      operationId: createProduct
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductWriteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/products/{productId}:
    get:
      tags: [Catalog]
      operationId: getProductById
      summary: Get product by id
      security: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Catalog]
      operationId: updateProductById
      summary: Update product by id
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductWriteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Catalog]
      operationId: deleteProductById
      summary: Archive product by id (soft delete)
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductWriteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/cart:
    get:
      tags: [Cart]
      operationId: getActiveCart
      summary: Get active cart
      responses:
        '200':
          description: Active cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/cart/items:
    post:
      tags: [Cart]
      operationId: addCartItem
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/cart/items/{sku}:
    patch:
      tags: [Cart]
      operationId: updateCartItem
      summary: Update cart item quantity
      parameters:
        - $ref: '#/components/parameters/Sku'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Cart]
      operationId: removeCartItem
      summary: Remove item from cart
      parameters:
        - $ref: '#/components/parameters/Sku'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/orders:
    post:
      tags: [Orders]
      operationId: createOrder
      summary: Checkout active cart and create order
      description: |
        Performs checkout for the authenticated user.

        Idempotency contract:
        - `Idempotency-Key` header is required, non-empty, max length 255.
        - Same authenticated user + same idempotency key + same logical request payload returns the same logical checkout result.
        - Reusing the same key with a different logical payload is rejected.

        gRPC error mapping contract for internal `OrderService/CreateOrder`:
        - `INVALID_ARGUMENT` → `CheckoutErrorCode.INVALID_ARGUMENT`
        - `NOT_FOUND` → `CheckoutErrorCode.CART_NOT_FOUND` or `CheckoutErrorCode.SKU_NOT_FOUND`
        - `FAILED_PRECONDITION` → `CheckoutErrorCode.CART_EMPTY`
        - `ABORTED` → `CheckoutErrorCode.STOCK_UNAVAILABLE`, `CheckoutErrorCode.IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_PAYLOAD`, or `CheckoutErrorCode.CONFLICT`
        - `PERMISSION_DENIED` → `CheckoutErrorCode.PAYMENT_DECLINED`
        - `INTERNAL` → `CheckoutErrorCode.INTERNAL`
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '202':
          description: Checkout accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/CheckoutBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/CheckoutNotFound'
        '409':
          $ref: '#/components/responses/CheckoutConflict'
        '500':
          $ref: '#/components/responses/CheckoutInternalServerError'
  /v1/orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrderById
      summary: Get order by id
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
    Sku:
      name: sku
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Required key for checkout request de-duplication.
        Must be non-empty and at most 255 characters.
        Same authenticated user + same key + same logical request payload must resolve to the same logical checkout result.
        Same authenticated user + same key + different logical request payload must be rejected.
      schema:
        type: string
        minLength: 1
        maxLength: 255
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: |
        Optional caller-provided correlation identifier for end-to-end tracing.
        If omitted, gateway/service may generate one.
      schema:
        type: string
        minLength: 1
        maxLength: 255
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated caller lacks required permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    CheckoutBadRequest:
      description: "Checkout request validation failed. ErrorResponse.code: INVALID_ARGUMENT"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CheckoutErrorResponse'
    CheckoutNotFound:
      description: "Checkout related resource not found. ErrorResponse.code: CART_NOT_FOUND or SKU_NOT_FOUND"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CheckoutErrorResponse'
    CheckoutConflict:
      description: "Checkout conflict. ErrorResponse.code: CART_EMPTY, STOCK_UNAVAILABLE, IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_PAYLOAD, CONFLICT, PAYMENT_DECLINED"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CheckoutErrorResponse'
    CheckoutInternalServerError:
      description: "Checkout internal failure. ErrorResponse.code: INTERNAL"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CheckoutErrorResponse'
  schemas:
    CheckoutErrorCode:
      type: string
      description: Canonical checkout error code set mapped from ecommerce.order.v1.CheckoutErrorCode.
      enum:
        - INVALID_ARGUMENT
        - CART_NOT_FOUND
        - CART_EMPTY
        - SKU_NOT_FOUND
        - STOCK_UNAVAILABLE
        - PAYMENT_DECLINED
        - IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_PAYLOAD
        - CONFLICT
        - INTERNAL
    CheckoutErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: '#/components/schemas/CheckoutErrorCode'
        message:
          type: string
        correlationId:
          type: string
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          x-oapi-codegen-extra-tags:
            validate: "required,email,max=254"
        password:
          type: string
          minLength: 8
          maxLength: 72
          x-oapi-codegen-extra-tags:
            validate: "required,min=8,max=72"
        displayName:
          type: string
          minLength: 1
          maxLength: 100
          x-oapi-codegen-extra-tags:
            validate: "omitempty,min=1,max=100"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          x-oapi-codegen-extra-tags:
            validate: "required,email,max=254"
        password:
          type: string
          minLength: 1
          maxLength: 72
          x-oapi-codegen-extra-tags:
            validate: "required,min=1,max=72"
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1
          x-oapi-codegen-extra-tags:
            validate: "required"
    AuthTokensResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    UserProfile:
      type: object
      required: [userId, email, role, status]
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, disabled]
        displayName:
          type: string
    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100
          x-oapi-codegen-extra-tags:
            validate: "omitempty,min=1,max=100"
    Product:
      type: object
      required: [productId, sku, name, price, currency, status]
      properties:
        productId:
          type: string
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        price:
          type: integer
          minimum: 0
        currency:
          type: string
        categoryId:
          type: string
          format: uuid
    ProductListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    StockSummary:
      type: object
      required: [quantity, reserved, available, status]
      properties:
        quantity:
          type: integer
          minimum: 0
        reserved:
          type: integer
          minimum: 0
        available:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [in_stock, out_of_stock]
    ProductWriteResponse:
      type: object
      required: [product, stock]
      properties:
        product:
          $ref: '#/components/schemas/Product'
        stock:
          $ref: '#/components/schemas/StockSummary'
    CreateProductRequest:
      type: object
      required: [sku, name, price, currencyCode, initialQuantity]
      properties:
        sku:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        description:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        price:
          type: integer
          minimum: 0
        currencyCode:
          type: string
          minLength: 1
        categoryId:
          type: string
          format: uuid
        initialQuantity:
          type: integer
          minimum: 0
    UpdateProductRequest:
      type: object
      properties:
        sku:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        description:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        price:
          type: integer
          minimum: 0
        categoryId:
          type: string
          format: uuid
    CartItem:
      type: object
      required: [sku, quantity, unitPrice, lineTotal]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: integer
          minimum: 0
        lineTotal:
          type: integer
          minimum: 0
        currency:
          type: string
        name:
          type: string
    Cart:
      type: object
      required: [cartId, userId, status, currency, items, totalAmount]
      properties:
        cartId:
          type: string
        userId:
          type: string
        status:
          type: string
          enum: [active, checked_out, expired]
        currency:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totalAmount:
          type: integer
          minimum: 0
    AddCartItemRequest:
      type: object
      required: [sku, quantity]
      properties:
        sku:
          type: string
          minLength: 1
          x-oapi-codegen-extra-tags:
            validate: "required"
        quantity:
          type: integer
          minimum: 1
          x-oapi-codegen-extra-tags:
            validate: "required,min=1"
    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1
          x-oapi-codegen-extra-tags:
            validate: "required,min=1"
    CreateOrderRequest:
      type: object
      properties:
        paymentMethod:
          type: string
          description: |
            Placeholder for initial payment method selection model.
            Contract mapping: forwarded as-is to internal payment proto field `ecommerce.payment.v1.InitiatePaymentRequest.provider_name`.
          minLength: 1
          maxLength: 50
          x-oapi-codegen-extra-tags:
            validate: "omitempty,min=1,max=50"
    OrderItem:
      type: object
      required: [sku, quantity, unitPrice, lineTotal]
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: integer
          minimum: 0
        lineTotal:
          type: integer
          minimum: 0
        currency:
          type: string
        name:
          type: string
        sku:
          type: string
    Order:
      type: object
      required: [orderId, userId, status, currency, totalAmount, items]
      properties:
        orderId:
          type: string
        userId:
          type: string
        status:
          type: string
          enum: [pending, awaiting_stock, awaiting_payment, confirmed, cancelled]
        currency:
          type: string
        totalAmount:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
