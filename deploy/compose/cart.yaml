services:
  cart-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${CART_POSTGRES_DB:-cart}
      POSTGRES_USER: ${CART_POSTGRES_USER:-cart}
      POSTGRES_PASSWORD: ${CART_POSTGRES_PASSWORD:-cart}
    ports:
      - "${CART_POSTGRES_PORT:-5435}:5432"
    volumes:
      - cart-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  cart-redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${CART_REDIS_PORT:-6380}:6379"
    volumes:
      - cart-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  cart-migrate:
    build:
      context: ../../
      dockerfile: internal/cart-svc/build/migrate.Dockerfile
    depends_on:
      cart-postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://${CART_POSTGRES_USER:-cart}:${CART_POSTGRES_PASSWORD:-cart}@cart-postgres:5432/${CART_POSTGRES_DB:-cart}?sslmode=disable
      GOOSE_MIGRATION_DIR: /app/migrations
    entrypoint: ["sh", "-c"]
    command:
      ["goose -dir \"$${GOOSE_MIGRATION_DIR}\" up"]
    restart: "no"

  cart-svc:
    build:
      context: ../../
      dockerfile: internal/cart-svc/build/app.Dockerfile
    depends_on:
      cart-postgres:
        condition: service_healthy
      cart-redis:
        condition: service_healthy
      cart-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      SERVICE_NAME: ${CART_SERVICE_NAME:-cart}
      SERVICE_ENV: ${CART_SERVICE_ENV:-local}
      SERVICE_HTTP_ADDR: ${CART_SERVICE_HTTP_ADDR:-:18083}
      SERVICE_GRPC_ADDR: ${CART_SERVICE_GRPC_ADDR:-:19093}
      POSTGRES_HOST: cart-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${CART_POSTGRES_DB:-cart}
      POSTGRES_USER: ${CART_POSTGRES_USER:-cart}
      POSTGRES_PASSWORD: ${CART_POSTGRES_PASSWORD:-cart}
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: cart-redis:6379
      KAFKA_BROKERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CATALOG_GRPC_ADDR: product-svc:19092
      AUTH_ACCESS_TOKEN_KEY: ${AUTH_ACCESS_TOKEN_KEY:-local-dev-access-token-key}
      AUTH_ACCESS_TOKEN_ISSUER: ${AUTH_ACCESS_TOKEN_ISSUER:-ecom-identity-svc}
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      LOG_LEVEL: ${CART_LOG_LEVEL:-debug}
    ports:
      - "18083:18083"
      - "19093:19093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18083/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  cart-postgres-data:
  cart-redis-data:
