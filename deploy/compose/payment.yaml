services:
  payment-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${PAYMENT_POSTGRES_DB:-payment}
      POSTGRES_USER: ${PAYMENT_POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD:-payment}
    ports:
      - "${PAYMENT_POSTGRES_PORT:-5437}:5432"
    volumes:
      - payment-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  payment-migrate:
    build:
      context: ../../
      dockerfile: internal/payment-svc/build/migrate.Dockerfile
    depends_on:
      payment-postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://${PAYMENT_POSTGRES_USER:-payment}:${PAYMENT_POSTGRES_PASSWORD:-payment}@payment-postgres:5432/${PAYMENT_POSTGRES_DB:-payment}?sslmode=disable
      GOOSE_MIGRATION_DIR: /app/migrations
    entrypoint: ["sh", "-c"]
    command:
      ["goose -dir \"$${GOOSE_MIGRATION_DIR}\" up"]
    restart: "no"

  payment-svc:
    build:
      context: ../../
      dockerfile: internal/payment-svc/build/app.Dockerfile
    depends_on:
      payment-postgres:
        condition: service_healthy
      payment-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    # Replace example env file with real local env file for real usage.
    env_file:
      - ../../internal/payment-svc/.env.example
    environment:
      SERVICE_HTTP_ADDR: ${PAYMENT_SERVICE_HTTP_ADDR:-:18085}
      SERVICE_GRPC_ADDR: ${PAYMENT_SERVICE_GRPC_ADDR:-:19095}
      POSTGRES_HOST: payment-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${PAYMENT_POSTGRES_DB:-payment}
      POSTGRES_USER: ${PAYMENT_POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD:-payment}
      KAFKA_BROKERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    ports:
      - "18085:18085"
      - "19095:19095"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18085/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  payment-postgres-data:
