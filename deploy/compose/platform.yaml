services:
  gateway:
    image: nginx:1.27-alpine
    depends_on:
      identity-svc:
        condition: service_healthy
      product-svc:
        condition: service_healthy
      cart-svc:
        condition: service_healthy
      order-svc:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ../../configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../configs/nginx/api_headers.inc:/etc/nginx/conf.d/api_headers.inc:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:8.0.0
    ports:
      - "9092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null
            2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  kafka-topics-init:
    image: confluentinc/cp-kafka:8.0.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["sh", "-ec"]
    command:
      [
        "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
          --topic payment.events --partitions 1 --replication-factor 1 &&
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
          --topic payment.events.retry --partitions 1 --replication-factor 1 &&
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
          --topic payment.events.dlq --partitions 1 --replication-factor 1 &&
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
          --topic order.events --partitions 1 --replication-factor 1 &&
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
          --topic order.events.retry --partitions 1 --replication-factor 1 &&
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
          --topic order.events.dlq --partitions 1 --replication-factor 1",
      ]
    restart: "no"

  schema-registry:
    image: confluentinc/cp-schema-registry:8.0.0
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
